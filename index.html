<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/jpeg" href="/images/logo.jpg" />
    <meta name="description" content="SVS Exporters - Premium floral exports from South India. We own dedicated farms and provide export-quality flowers to the UK, USA, and Middle East within 24–72 hours via Bengaluru Airport." />
    
    <!-- Social/SEO Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.svsexporters.com/" />
    <meta property="og:title" content="SVS Exporters | Premium Floral Exports from India" />
    <meta property="og:description" content="Direct from our own farms to your doorstep. Premium fresh flowers, traditional garlands, and foliage exported globally to the UK, USA, UAE, and the Middle East." />
    <meta property="og:image" content="https://www.svsexporters.com/images/hero.png" />

    <!-- International Focus -->
    <link rel="alternate" hreflang="en-GB" href="https://www.svsexporters.com/" />
    <link rel="alternate" hreflang="en-US" href="https://www.svsexporters.com/" />
    <link rel="alternate" hreflang="en-AE" href="https://www.svsexporters.com/" />
    <link rel="alternate" hreflang="x-default" href="https://www.svsexporters.com/" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SVS Exporters",
      "url": "https://www.svsexporters.com/",
      "logo": "https://www.svsexporters.com/images/logo.jpg",
      "description": "Premium floral exporter from Bengaluru, India, specializing in farm-direct fresh flowers and traditional garlands for the global market, including UK, USA, Europe, and the Middle East.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bengaluru",
        "addressRegion": "Karnataka",
        "addressCountry": "IN"
      },
      "areaServed": ["United Kingdom", "United States", "United Arab Emirates", "Middle East", "Europe", "Singapore", "Global"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "SVS Exporters Catalog",
        "url": "https://www.svsexporters.com/SVS%20Exporters%20Catalog.pdf"
      }
    }
    </script>

    <title>SVS Exporters | Premium Floral Exports from India</title>
  </head>
